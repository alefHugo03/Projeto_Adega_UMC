<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Adega UMC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/vendas.css}">
</head>
<body class="dashboard-body">
    <div class="layout-wrapper">
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Adega UMC</h2>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/home}">Dashboard</a>
                <a th:href="@{/produtos}">Produtos</a>
                <a th:href="@{/estoque}">Estoque</a>
                <a th:href="@{/vendas}" class="active">Vendas</a>
                <button class="btn-logout-sidebar" onclick="logout()">Sair</button>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-info">
                    <h1>Histórico de Vendas</h1>
                    <p>Gerencie as transações realizadas no sistema.</p>
                </div>
                <button class="btn btn-primary" onclick="iniciarNovaVenda()">+ Registrar Venda</button>
            </header>

            <section class="card table-card">
                <h3>Vendas Realizadas</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Data</th><th>Pagamento</th><th>Valor Total</th><th>Status</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="tabela-vendas-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal de Registro/Edição de Venda -->
    <div id="modal-venda" class="modal">
        <div class="card modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="modal-venda-titulo">Nova Venda</h2>
                <button class="btn-close-modal" onclick="fecharModal('modal-venda')">&times;</button>
            </div>
            <form id="form-venda" onsubmit="salvarVenda(event)">
                <input type="hidden" id="venda-id">

                <div class="form-group mb-2">
                    <label for="venda-usuario">Vendedor:</label>
                    <select id="venda-usuario" required>
                        <option value="">Selecione um usuário...</option>
                    </select>
                </div>

                <div class="form-group mb-2">
                    <label for="venda-produto">Produto:</label>
                    <select id="venda-produto" required onchange="atualizarResumoTotal()">
                        <option value="">Selecione um produto...</option>
                    </select>
                </div>

                <div class="form-group mb-2">
                    <label for="venda-quantidade">Quantidade:</label>
                    <input type="number" id="venda-quantidade" min="1" value="1" required oninput="atualizarResumoTotal()">
                </div>

                <div class="resumo-valores mb-3 p-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong>Total da Venda:</strong>
                        <span id="valor-total-venda" class="total-venda-destaque">R$ 0,00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-1">
                        <strong>Total Pago:</strong>
                        <span id="valor-total-pago" class="total-pago-status">R$ 0,00</span>
                    </div>
                </div>

                <hr class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h3 class="modal-subheader">Pagamentos</h3>
                    <button type="button" class="btn btn-info btn-table-action" onclick="adicionarLinhaPagamento()">+ Forma de Pagamento</button>
                </div>
                
                <div id="container-pagamentos" class="mb-3">
                    <!-- Linhas de pagamento inseridas dinamicamente pelo JS -->
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="button" class="btn btn-danger" onclick="fecharModal('modal-venda')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Finalizar Venda</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div id="modal-detalhes" class="modal">
        <div class="card modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Itens da Venda #<span id="detalhe-id-venda"></span></h2>
                <button class="btn-close-modal" onclick="fecharModal('modal-detalhes')">&times;</button>
            </div>
            
            <div class="resumo-valores mb-3 p-2">
                <strong>Resumo do Pagamento:</strong>
                <p id="detalhe-pagamento-venda" class="mt-1" style="color: var(--primary-color); font-weight: bold; margin-bottom: 0;"></p>
            </div>

            <div id="lista-itens-venda" class="itens-venda-grid mt-2">
                <!-- Itens injetados via JS -->
            </div>
            <div class="mt-3 text-right">
                <button class="btn btn-primary" onclick="fecharModal('modal-detalhes')">Fechar</button>
            </div>
        </div>
    </div>

    <script type="module" th:src="@{/js/vendas/vendas.js}"></script>
</body>
</html>
