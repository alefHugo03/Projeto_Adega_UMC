<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Adega UMC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/vendas.css}">
</head>
<body class="dashboard-body">
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Adega UMC</h2>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/home}">Dashboard</a>
                <a th:href="@{/produtos}">Produtos</a>
                <a th:href="@{/estoque}">Estoque</a>
                <a th:href="@{/vendas}" class="active">Vendas</a>
                <button class="btn-logout-sidebar" onclick="window.logout()">Sair</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-info">
                    <h1>Histórico de Vendas</h1>
                    <p>Gerencie as transações realizadas no sistema.</p>
                </div>
                <button class="btn btn-primary" onclick="window.iniciarNovaVenda()">+ Registrar Venda</button>
            </header>

            <div class="vendas-container">
                <!-- Lista de Vendas -->
                <section class="card table-card">
                    <h3>Vendas Realizadas</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Data</th><th>Pagamento</th><th>Valor Total</th><th>Ações</th></tr>
                            </thead>
                            <tbody id="tabela-vendas-body"></tbody>
                        </table>
                    </div>
                </section>

                <!-- Modal de Registro/Edição de Venda -->
                <div id="modal-venda" class="modal-overlay" style="display: none;">
                    <div class="modal-content card">
                        <div class="modal-header d-flex justify-content-between align-items-center mb-2">
                            <h3 id="modal-venda-titulo">Registrar Venda</h3>
                            <button class="btn-close-modal" onclick="window.fecharModal('modal-venda')">&times;</button>
                        </div>
                        <form id="form-venda" onsubmit="window.salvarVenda(event)">
                            <input type="hidden" id="venda-id">
                            <div class="form-group mb-3">
                                <label for="venda-pagamento">Forma de Pagamento</label>
                                <select id="venda-pagamento" class="form-control" required>
                                    <option value="">Selecione...</option>
                                    <option value="DINHEIRO">Dinheiro</option>
                                    <option value="CARTAO">Cartão</option>
                                    <option value="PIX">PIX</option>
                                </select>
                            </div>
                            <div class="modal-footer d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary" onclick="window.fecharModal('modal-venda')">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Salvar Venda</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Modal de Detalhes da Venda (Popup) -->
                <div id="modal-detalhes" class="modal-overlay" style="display: none;">
                    <div class="modal-content card">
                        <div class="modal-header d-flex justify-content-between align-items-center mb-2">
                            <h3>Itens da Venda #<span id="detalhe-id-venda"></span></h3>
                            <button class="btn-close-modal" onclick="window.fecharModal('modal-detalhes')">&times;</button>
                        </div>
                        <div id="lista-itens-venda" class="itens-venda-grid">
                            <!-- Conteúdo injetado via JS -->
                        </div>
                        <div class="modal-footer mt-3" style="text-align: right;">
                            <button class="btn btn-primary" onclick="window.fecharModal('modal-detalhes')">Fechar</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" th:src="@{/js/vendas/vendas.js}"></script>
</body>
</html>
