<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Adego Systems</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/vendas.css}">
</head>
<body class="dashboard-body">
    <div class="layout-wrapper">
        <!-- Sidebar injetada via JS -->
        <div id="sidebar-container"></div>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-info">
                    <h1>Histórico de Vendas</h1>
                    <p>Gerencie as transações realizadas no sistema.</p>
                </div>
                <button class="btn btn-primary" onclick="iniciarNovaVenda()">+ Registrar Venda</button>
            </header>

            <!-- Controles de Filtro Compactos -->
            <section class="card filter-card">
                <div class="d-flex align-items-center gap-2">
                    <h5 class="mb-0 filter-title">FILTROS:</h5>
                    <input type="date" id="filter-data-venda" class="form-control" title="Data da Venda">
                    <input type="number" id="filter-usuario-id" class="form-control" placeholder="ID Vendedor">
                    <select id="filter-forma-pagamento" class="form-control">
                        <option value="">Todas as Formas</option>
                        <option value="DINHEIRO">Dinheiro</option>
                        <option value="PIX">Pix</option>
                        <option value="CARTAO_DEBITO">Cartão de Débito</option>
                        <option value="CARTAO_CREDITO">Cartão de Crédito</option>
                    </select>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary filter-btn" onclick="window.aplicarFiltrosVendas()">Filtrar</button>
                        <button class="btn btn-info filter-btn" onclick="window.limparFiltrosVendas()">Limpar</button>
                    </div>
                </div>
            </section>

            <section class="card table-card">
                <h3>Vendas Realizadas</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Data</th><th>Pagamento</th><th>Valor Total</th><th>Status</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="tabela-vendas-body"></tbody>
                    </table>
                </div>

                <!-- Controles de Paginação -->
                <div class="d-flex justify-content-between align-items-center mt-3 p-2" style="background: #1A1A1A; border-radius: 8px;">
                    <div>
                        <button id="prev-page-btn" class="btn btn-primary btn-table-action" onclick="window.prevPage()">Anterior</button>
                        <button id="next-page-btn" class="btn btn-primary btn-table-action" onclick="window.nextPage()">Próxima</button>
                    </div>
                    
                    <span id="pagination-info" class="text-muted"></span>

                    <div class="d-flex align-items-center gap-2">
                        <label for="page-size-select" style="font-size: 0.85rem;">Exibir:</label>
                        <select id="page-size-select" class="form-control" style="width: auto; padding: 2px 10px;" onchange="window.changePageSize(this)">
                            <option value="4">4 itens</option>
                            <option value="7">7 itens</option>
                            <option value="10" selected>10 itens</option>
                            <option value="20">20 itens</option>
                        </select>
                    </div>
                </div>
                <!-- Fim dos Controles de Paginação -->
            </section>
        </main>
    </div>

    <!-- Modal de Registro/Edição de Venda -->
    <div id="modal-venda" class="modal">
        <div class="card modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="modal-venda-titulo">Nova Venda</h2>
                <button class="btn-close-modal" onclick="fecharModal('modal-venda')">&times;</button>
            </div>
            <form id="form-venda" onsubmit="salvarVenda(event)">
                <input type="hidden" id="venda-id">

                <div class="form-group mb-2">
                    <label for="venda-produto">Produto:</label>
                    <select id="venda-produto" required onchange="atualizarResumoTotal()">
                        <option value="">Selecione um produto...</option>
                    </select>
                </div>

                <div class="form-group mb-2">
                    <label for="venda-quantidade">Quantidade:</label>
                    <input type="number" id="venda-quantidade" min="1" value="1" required oninput="atualizarResumoTotal()">
                </div>

                <div class="form-group mb-2" id="grupo-motivo-venda" style="display: none;">
                    <label for="venda-motivo">Motivo (retirada administrativa):</label>
                    <input type="text" id="venda-motivo" class="form-control" placeholder="Motivo da retirada (ex: Quebra)">
                </div>

                <div class="resumo-valores mb-3 p-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong>Total da Venda:</strong>
                        <span id="valor-total-venda" class="total-venda-destaque">R$ 0,00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-1">
                        <strong>Total Pago:</strong>
                        <span id="valor-total-pago" class="total-pago-status">R$ 0,00</span>
                    </div>
                </div>

                <hr class="mb-3">
                <div id="grupo-pagamentos" class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h3 class="modal-subheader">Pagamentos</h3>
                        <button type="button" class="btn btn-info btn-table-action" onclick="adicionarLinhaPagamento()">+ Forma de Pagamento</button>
                    </div>
                    
                    <div id="container-pagamentos" class="mb-3">
                        <!-- Linhas de pagamento inseridas dinamicamente pelo JS -->
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="button" class="btn btn-danger" onclick="fecharModal('modal-venda')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Finalizar Venda</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div id="modal-detalhes" class="modal">
        <div class="card modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Itens da Venda #<span id="detalhe-id-venda"></span></h2>
                <button class="btn-close-modal" onclick="fecharModal('modal-detalhes')">&times;</button>
            </div>
            
            <div class="resumo-valores mb-3 p-2">
                <div class="d-flex justify-content-between">
                    <span><strong>Vendedor:</strong> <span id="detalhe-vendedor-venda"></span></span>
                </div>
                <div class="mt-1">
                    <strong>Pagamento:</strong> <span id="detalhe-pagamento-venda" style="color: var(--primary-color); font-weight: bold;"></span>
                </div>
                <div class="mt-1">
                    <strong>Motivo:</strong> <span id="detalhe-motivo-venda" style="color: var(--secondary-color);"></span>
                </div>
            </div>

            <div id="lista-itens-venda" class="itens-venda-grid mt-2">
                <!-- Itens injetados via JS -->
            </div>
            <div class="mt-3 text-right">
                <button class="btn btn-primary" onclick="fecharModal('modal-detalhes')">Fechar</button>
            </div>
        </div>
    </div>
    
    <!-- Scripts --> 
    <script type="module" th:src="@{/js/vendas/vendas.js}"></script>
</body>
</html>
