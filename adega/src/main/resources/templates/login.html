<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adega UMC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <div class="card card-sm">
            <h1>Adega UMC</h1>
            <p>Entre com suas credenciais</p>
            <form id="formLogin">
                <div class="form-group">
                    <label for="inputEmail">E-mail</label>
                    <input type="email" id="inputEmail" placeholder="seu@email.com" autocomplete="current-password" required>
                </div>
                <div class="form-group">
                    <label for="inputSenha">Senha</label>
                    <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            </form>
        </div>
    </div>

    <script th:src="@{/js/login/login.js}"></script>
</body>
</html>
