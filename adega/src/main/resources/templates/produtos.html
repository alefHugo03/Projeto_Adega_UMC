<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Produtos - Adego Systems</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/produtos.css}">
</head>
<body class="dashboard-body">
    <div class="layout-wrapper">
        <!-- Barra Lateral de Navegação -->
        <div id="sidebar-container"></div>


        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-info">
                    <h1>Gerenciamento de Produtos</h1>
                    <p>Adicione, edite ou remova produtos do seu catálogo.</p>
                </div>
                <button class="btn btn-primary" onclick="window.prepararCriacao()">+ Novo Produto</button>
            </header>

            <section class="card table-card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Nome</th><th>Tipo</th><th>Valor</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="tabela-produtos-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Modal de Produto (Criação/Edição) -->
    <div id="modal-produto" class="modal">
        <div class="card modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="modal-produto-titulo">Novo Produto</h2>
                <button class="btn-close-modal" id="btn-close-modal-produto">&times;</button>
            </div>
            <form id="form-produto" onsubmit="window.salvarProduto(event)">
                <input type="hidden" id="produto-id">
                <div class="form-group mb-3">
                    <label for="produto-nome">Nome do Produto:</label>
                    <input type="text" id="produto-nome" required>
                </div>
                <div class="form-group mb-3">
                    <label for="produto-tipo">Tipo do Produto:</label>
                    <input type="text" id="produto-tipo" required>
                </div>
                <div class="form-group mb-4">
                    <label for="produto-valor">Valor Unitário:</label>
                    <input type="text" id="produto-valor" pattern="^\d+(\,\d{1,2})?$" placeholder="Ex: 12,50" required>
                    <small style="color: var(--text-muted);">Use vírgula para separar os centavos (ex: 12,50).</small>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-danger" id="btn-cancelar-produto">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" th:src="@{/js/produtos/acoes.js}"></script>
    <!-- Importa e expõe funções globais para o HTML -->
    <script type="module">
        import { abrirModal, fecharModal, fecharAoClicarFora } from '../js/modules/modal.js';
        import { prepararCriacao, prepararEdicao, excluirProduto, salvarProduto } from '../js/produtos/acoes.js';
        import { loadSidebar } from '../js/modules/sidebar.js';
        import logout from '../js/conection/logout.js';

        window.abrirModal = abrirModal;
        window.fecharModal = fecharModal;
        window.prepararCriacao = prepararCriacao;
        window.prepararEdicao = prepararEdicao;
        window.excluirProduto = excluirProduto;
        window.salvarProduto = salvarProduto;
        window.logout = logout;

        // Carrega a sidebar e ajusta a visibilidade do menu de usuários
        document.addEventListener('DOMContentLoaded', loadSidebar);

        // Anexa o evento de clique ao botão de fechar modal programaticamente
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-close-modal-produto')?.addEventListener('click', () => fecharModal('modal-produto'));
            document.getElementById('btn-cancelar-produto')?.addEventListener('click', () => fecharModal('modal-produto'));
        });
        window.addEventListener('click', fecharAoClicarFora);
    </script>
</body>
</html>
