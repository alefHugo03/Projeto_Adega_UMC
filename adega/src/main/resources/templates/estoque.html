<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Adego Systems</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="dashboard-body">
    <div class="layout-wrapper">
        <!-- Sidebar injetada via JS -->
        <div id="sidebar-container"></div>

        <!-- Pagina principal do site-->>
        <main class="main-content">
            <header class="content-header">
                <div class="header-info">
                    <h1>Controle de Estoque</h1>
                    <p>Monitore e reponha o nível de mercadorias.</p>
                </div>
                <button class="btn btn-primary" onclick="window.iniciarNovaEntrada()">+ Nova Entrada</button>
            </header>

            <section class="card table-card">
                <h3>Níveis de Estoque</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Categoria</th>
                                <th>Quantidade</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-estoque-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal de Reposição -->
    <div id="modal-estoque" class="modal">
        <div class="card modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="modal-estoque-titulo">Dar Entrada no Estoque</h2>
                <button class="btn-close-modal" id="btn-close-modal-estoque">&times;</button>
            </div>
            <form id="form-estoque" onsubmit="window.salvarEstoque(event)">
                <input type="hidden" id="estoque-id">
                <input type="hidden" id="estoque-produto-id">

                <div class="form-group mb-3">
                    <label>Produto:</label>
                    <select id="estoque-produto-selecao" class="form-control" style="display: none;"></select>
                    <input type="text" id="estoque-produto-nome-fixo" readonly style="opacity: 0.7; cursor: not-allowed; display: none;">
                </div>

                <div class="form-group mb-4">
                    <label for="estoque-quantidade">Quantidade a Adicionar:</label>
                    <input type="number" id="estoque-quantidade" min="1" required>
                    <small style="color: var(--text-muted);">Informe a quantidade que será adicionada ao estoque atual.</small>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-danger" id="btn-cancelar-estoque">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Adicionar ao Estoque</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { carregarEstoque, prepararEntradaEstoque, salvarEstoque, iniciarNovaEntrada } from '../js/estoque/acoes.js';
        import { fecharModal, fecharAoClicarFora } from '../js/modules/modal.js';
        import { loadSidebar } from '../js/modules/sidebar.js';
        import logout from '../js/conection/logout.js';

        window.carregarEstoque = carregarEstoque;
        window.prepararEntradaEstoque = prepararEntradaEstoque;
        window.iniciarNovaEntrada = iniciarNovaEntrada;
        window.salvarEstoque = salvarEstoque;
        window.fecharModal = fecharModal;
        window.logout = logout;

        // Carrega a sidebar e ajusta a visibilidade do menu de usuários
        document.addEventListener('DOMContentLoaded', loadSidebar);

        // Gerenciamento de eventos de fechamento
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-close-modal-estoque')?.addEventListener('click', () => fecharModal('modal-estoque'));
            document.getElementById('btn-cancelar-estoque')?.addEventListener('click', () => fecharModal('modal-estoque'));
        });

        // Fecha modal ao clicar fora da caixa branca
        window.addEventListener('click', fecharAoClicarFora);

        document.addEventListener('DOMContentLoaded', carregarEstoque);
    </script>
</body>
</html>
