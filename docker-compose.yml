services:
  db:
    # Usa a imagem oficial do MySQL 8 para o banco de dados.
    image: mysql:8.0
    container_name: adega_banco
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT_HOST:-3307}:3306" # Mapeia a porta do MySQL via variável do .env
    volumes:
      - db_data:/var/lib/mysql # Persiste dados do banco entre reinícios.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Constrói o backend Java a partir do diretório ./adega.
    build: ./adega
    container_name: adega_server
    restart: on-failure
    ports:
      - "${API_PORT_HOST:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  db_data: # Volume nomeado para armazenar dados do MySQL.
