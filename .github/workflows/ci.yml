name: CI - Adega UMC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        # Com o arquivo application.properties em src/test/resources, o Maven usará H2 automaticamente
        run: mvn -f adega/pom.xml clean package

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build
        run: |
          cd site-adega
          # --legacy-peer-deps ignora conflitos de versão do ESLint no ambiente de CI
          npm install --legacy-peer-deps
          npm run build --if-present

  docker:
    name: Docker Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create dummy .env for build validation
        run: |
          echo "MYSQL_ROOT_PASSWORD=ci_test" > .env
          echo "MYSQL_DATABASE=adega" >> .env
          echo "MYSQL_USER=ci_user" >> .env
          echo "MYSQL_PASSWORD=ci_pass" >> .env
      - name: Build Docker Images
        run: docker compose build