name: CI - Adega UMC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Validação do Backend (Java 21 + Maven)
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        # Os testes agora usarão o H2 configurado em src/test/resources
        run: mvn -f adega/pom.xml clean package

  # Validação do Frontend (Node + React/Vite)
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build
        run: |
          cd site-adega
          # --legacy-peer-deps resolve o erro ERESOLVE do ESLint
          npm install --legacy-peer-deps
          npm run build --if-present

  # Verificação do Docker Compose
  docker:
    name: Docker Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Images
        # Valida se o docker-compose.yml e os Dockerfiles estão corretos
        run: |
          echo "MYSQL_ROOT_PASSWORD=test" > .env
          docker compose build